<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minha Conta</title>
    <link rel="stylesheet" href="./css/usuario.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
  </head>

  <body>
    <div class="user-page">
      <div class="sidebar">
        <button class="btn-voltar" onclick="voltarIndex()">
          <i class="fa fa-arrow-left"></i>
        </button>
        <h3>Minha Conta</h3>
        <div onclick="mostrarPerfil()">Perfil</div>
        <div onclick="mostrarPedidos()">Meus Pedidos</div>
        <div onclick="mostrarConfig()">Configurações</div>
        <div onclick="sair()">Sair</div>
      </div>

        <div class="profile-fixed">
          <div id="perfilBox" class="profile-box"></div>
          <div id="pedidosBox" class="profile-box" style="display:none;"></div>
        </div>
      </div>
    </div>

    <template id="pedidoTemplate">
      <div class="pedido-card">
        <div class="pedido-header">
          <div>
            <span class="pedido-id"></span>
            <span class="pedido-data"></span>
          </div>
          <div class="pedido-right">
            <span class="pedido-status"></span>
            <span class="pedido-total"></span>
            <span class="pedido-toggle">
              <i class="fa-solid fa-chevron-down"></i>
            </span>
          </div>
        </div>
          <div class="pedido-progress">
            <div class="step step-processando">
              <div class="dot"></div>
              <span>Processando</span>
            </div>
            <div class="line"></div>
            <div class="step step-enviado">
              <div class="dot"></div>
              <span>Enviado</span>
            </div>
            <div class="line"></div>
            <div class="step step-entregue">
              <div class="dot"></div>
              <span>Entregue</span>
            </div>
          </div>
        <div class="pedido-produtos">
        </div>
      </div>
    </template>

    <script src="./js/usuario.js"></script>
  </body>
</html>
